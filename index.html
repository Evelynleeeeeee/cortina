<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可堤那窗藝 - 內部估價系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F6F8; 
            --text-color: #333333;
            --accent-color: #3A5A78; 
            --accent-hover: #597A9B; 
            --border-color: #DDE2E5;
            --card-bg: #FFFFFF;
            --step-bg: #EAF0F4; 
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 3px;
            color: var(--accent-color);
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #5C6B77; 
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .app-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(58, 90, 120, 0.05);
        }

        /* Tabs Styling */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 1rem;
            color: #7A8B99;
            font-weight: 600;
            border-radius: 8px 8px 0 0;
            transition: 0.3s;
        }
        .tab-btn:hover {
            color: var(--accent-color);
        }
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            background: var(--step-bg);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.85rem;
            color: #5C6B77;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .dual-input-wrapper { display: flex; gap: 10px; }
        
        .input-with-unit {
            position: relative;
            width: 100%;
        }
        .input-with-unit input { padding-right: 40px; }
        .input-with-unit span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .nested-box {
            background: #FAFAFA;
            border: 1px solid #EAEAEA;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .nested-box-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: block;
        }

        .manual-box {
            background: #FFF9F9;
            border: 1px solid #FFDADA;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .logic-card {
            background: #FFF;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #EAEAEA;
        }

        .step-item {
            margin-bottom: 20px;
            padding-left: 20px;
            border-left: 3px solid var(--accent-color);
            position: relative;
        }
        .step-title {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 5px;
        }
        .step-content {
            font-size: 0.95rem;
            color: #4A5560;
            background: var(--step-bg);
            padding: 12px;
            border-radius: 6px;
        }

        .final-price-area {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border-top: 2px dashed #E2E8ED;
        }
        .price-label { font-size: 1rem; color: #7A8B99; }
        .price-value { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            color: var(--accent-color);
            font-weight: bold;
        }
        .overridden-price {
            text-decoration: line-through;
            font-size: 1.5rem;
            color: #AAA;
        }
        .manual-active {
            color: #C06055; 
            font-weight: 700;
        }

        .btn-save {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-save:hover { background: var(--accent-hover); }

        .history-section { margin-top: 50px; }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .history-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #EAEAEA;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        /* --- 新增：客製化 Modal 彈出視窗樣式 --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .modal-container {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(58, 90, 120, 0.15);
            max-width: 400px;
            width: 90%;
        }
        .modal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .modal-message {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 10px;
        }
        .modal-question {
            font-size: 1rem;
            color: #5C6B77;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .modal-btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-continue {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s;
            flex: 1;
        }
        .btn-continue:hover { background: var(--accent-hover); }
        .btn-complete {
            background: #FFFFFF;
            color: #5C6B77;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s;
            flex: 1;
        }
        .btn-complete:hover { background: #EAF0F4; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1>可堤那窗藝</h1>
        <div class="subtitle">內部估價系統</div>
    </header>

    <div class="app-grid">
        <div class="card">
            <div class="form-group">
                <label>客戶名稱 / 空間位置</label>
                <input type="text" id="customerName" placeholder="例如：林先生 - 主臥">
            </div>
            
            <div class="form-group">
                <label>寬度</label>
                <div class="dual-input-wrapper">
                    <div class="input-with-unit">
                        <input type="number" id="widthCm" value="200" oninput="syncDimension('width', 'cm')">
                        <span>cm</span>
                    </div>
                    <div class="input-with-unit">
                        <input type="number" id="widthFt" step="0.01" value="6.60" oninput="syncDimension('width', 'ft')">
                        <span>尺</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>高度</label>
                <div class="dual-input-wrapper">
                    <div class="input-with-unit">
                        <input type="number" id="heightCm" value="200" oninput="syncDimension('height', 'cm')">
                        <span>cm</span>
                    </div>
                    <div class="input-with-unit">
                        <input type="number" id="heightFt" step="0.01" value="6.60" oninput="syncDimension('height', 'ft')">
                        <span>尺</span>
                    </div>
                </div>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('fabric')">布/紗簾</button>
                <button class="tab-btn" onclick="switchTab('panel')">片簾</button>
                <button class="tab-btn" onclick="switchTab('blinds')">窗材</button>
            </div>

            <div id="tab-fabric" class="tab-content active">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>品項</label>
                        <select id="materialType">
                            <option value="布">布料</option>
                            <option value="紗">紗簾</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>款式</label>
                        <select id="curtainStyle">
                            <option value="S簾">S簾</option>
                            <option value="正三折">正三折</option>
                            <option value="反三折">反三折</option>
                        </select>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>布幅規格</label>
                        <select id="fabricWidth">
                            <option value="5">5尺布</option>
                            <option value="9">9尺布</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>牌價</label>
                        <input type="number" id="listPrice" value="120">
                    </div>
                </div>
            </div>

            <div id="tab-panel" class="tab-content">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>軌道售價 (手動輸入)</label>
                        <input type="number" id="panelTrackPrice" value="1500">
                    </div>
                    <div class="form-group">
                        <label>幅寬 (cm)</label>
                        <select id="panelFabricWidth">
                            <option value="40">40 cm</option>
                            <option value="60">60 cm</option>
                            <option value="80">80 cm</option>
                        </select>
                    </div>
                </div>
                
                <div class="nested-box">
                    <span class="nested-box-title">主布片 (款式 1)</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label>布片價格 (單片)</label>
                            <input type="number" id="panelPrice1" value="500">
                        </div>
                        <div class="form-group">
                            <label>安裝片數</label>
                            <input type="number" id="panelCount1" value="4">
                        </div>
                    </div>
                </div>

                <div class="nested-box">
                    <span class="nested-box-title">跳色布片 (款式 2 - 選填)</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label>布片價格 (單片)</label>
                            <input type="number" id="panelPrice2" value="0">
                        </div>
                        <div class="form-group">
                            <label>安裝片數</label>
                            <input type="number" id="panelCount2" value="0">
                        </div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>拉棒選項</label>
                        <select id="panelWandType">
                            <option value="0">無拉棒</option>
                            <option value="600">單拉棒 ($600)</option>
                            <option value="1300">雙拉棒 ($1300)</option>
                            <option value="1300">轉向拉棒 ($1300)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>數量</label>
                        <input type="number" id="panelWandQty" value="1" min="0">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>軌道類型 (運費)</label>
                        <select id="panelTrackType">
                            <option value="1">單軌 ($400/組)</option>
                            <option value="2">雙軌 ($800/2組)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>安裝固定方式</label>
                        <select id="panelFixing">
                            <option value="0">單邊固定 (無附加費)</option>
                            <option value="1500">左右不固定 (+$1500)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="tab-blinds" class="tab-content">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>窗材種類 (基本才數)</label>
                        <select id="blindType">
                            <option value="15_捲簾">捲簾 (15才)</option>
                            <option value="15_調光簾(台製)">調光簾-台製 (15才)</option>
                            <option value="20_調光簾(韓製)">調光簾-韓製 (20才)</option>
                            <option value="12_木百葉">木百葉 (12才)</option>
                            <option value="15_蜂巢簾">蜂巢簾 (15才)</option>
                            <option value="20_拉門(8.5cm)">拉門 8.5cm (20才)</option>
                            <option value="25_拉門(10cm)">拉門 10cm (25才)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>牌價 (每才)</label>
                        <input type="number" id="blindListPrice" value="150">
                    </div>
                </div>
            </div>

            <div class="manual-box">
                <label style="color: #C06055;">💰 手動覆寫最終報價 (可留空)</label>
                <input type="number" id="manualPrice" placeholder="填寫此欄位將取代系統計算">
            </div>
            <button class="btn-save" id="saveBtn" onclick="saveData()">💾 儲存報價資料</button>
        </div>

        <div class="logic-card">
            <h3 style="margin-top: 0; font-family: 'Playfair Display', serif;">Live Calculation</h3>
            <div class="step-item">
                <div class="step-title">步驟 1：尺寸確認</div>
                <div class="step-content" id="step1">--</div>
            </div>
            <div class="step-item">
                <div class="step-title" id="step2-title">步驟 2：規格判定</div>
                <div class="step-content" id="step2">--</div>
            </div>
            <div class="step-item">
                <div class="step-title" id="step3-title">步驟 3：用量計算</div>
                <div class="step-content" id="step3">--</div>
            </div>
            <div class="step-item">
                <div class="step-title">步驟 4：總價構成 (公式拆解)</div>
                <div class="step-content" id="step4">--</div>
            </div>
            <div class="final-price-area">
                <div class="price-label">最終報價金額</div>
                <div id="priceDisplay" class="price-value">NT$ 0</div>
            </div>
        </div>
    </div>

    <div class="history-section">
        <h2 style="text-align:center; font-family: 'Playfair Display', serif; color: var(--accent-color);">History Archive</h2>
        <div id="historyGrid" class="history-grid"></div>
    </div>
</div>

<div id="successModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-icon">✅</div>
        <div class="modal-message">已成功記錄到報價資料庫裡</div>
        <div id="modalQuestion" class="modal-question">是否繼續新增 <strong>[客戶名稱]</strong> 的其他空間？</div>
        <div class="modal-btn-group">
            <button class="btn-complete" onclick="finishAndClose()">完成，結案</button>
            <button class="btn-continue" onclick="continueAdding()">繼續新增</button>
        </div>
    </div>
</div>

<script>
// 請確保此處填入的是最新部署的 GAS 網址
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvc1QtI_shVEz8qicBqyuohHXOfZB5i_8wm3hiz_8Qjf8JUF5tCg48T_0QgsSiUoi2/exec"; 
const CM_TO_FT = 30.3;
    let currentTab = 'fabric';

    document.addEventListener("DOMContentLoaded", () => {
        const configInputs = [
            'materialType', 'curtainStyle', 'fabricWidth', 'listPrice', 'manualPrice',
            'panelTrackPrice', 'panelFabricWidth', 'panelPrice1', 'panelCount1', 'panelPrice2', 'panelCount2', 
            'panelWandType', 'panelWandQty', 'panelTrackType', 'panelFixing',
            'blindType', 'blindListPrice'
        ];
        configInputs.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updateUI);
                el.addEventListener('change', updateUI);
            }
        });
        updateUI();
        loadHistory();
    });

    function switchTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
        
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        
        updateUI();
    }

    function syncDimension(dimension, sourceUnit) {
        const cmInput = document.getElementById(`${dimension}Cm`);
        const ftInput = document.getElementById(`${dimension}Ft`);
        if (sourceUnit === 'cm') {
            const cmValue = parseFloat(cmInput.value);
            if (!isNaN(cmValue)) ftInput.value = (cmValue / CM_TO_FT).toFixed(2);
            else ftInput.value = '';
        } else {
            const ftValue = parseFloat(ftInput.value);
            if (!isNaN(ftValue)) cmInput.value = Math.round(ftValue * CM_TO_FT);
            else cmInput.value = '';
        }
        updateUI();
    }

    function getCalcResult() {
        const wFt = parseFloat(document.getElementById('widthFt').value) || 0;
        const hFt = parseFloat(document.getElementById('heightFt').value) || 0;

        if (wFt <= 0 || hFt <= 0) return null;

        let res = { baseTotal: 0, formulaHTML: "", specsStr: "", fabricVal: "", steps: [] };
        res.steps[0] = `寬度：${wFt.toFixed(2)} 尺 | 高度：${hFt.toFixed(2)} 尺`;

        if (currentTab === 'fabric') {
            const type = document.getElementById('materialType').value;
            const style = document.getElementById('curtainStyle').value;
            const fWidth = parseInt(document.getElementById('fabricWidth').value) || 5;
            const listPrice = parseFloat(document.getElementById('listPrice').value) || 0;

            let multiplier = (type === '紗') ? (style === 'S簾' ? 2.5 : 2.3) : (style === '正三折' ? 2 : (style === '反三折' ? 2.2 : (hFt > 8.5 ? 2.7 : 2.5)));
            res.steps[1] = `${type} + ${style} ➔ 採用 ${multiplier} 倍摺數`;

            let totalFabric = 0;
            if (fWidth === 5) {
                const panels = Math.ceil((wFt * multiplier) / 5);
                const heightCeil = Math.ceil(hFt + 1);
                totalFabric = panels * heightCeil;
                res.steps[2] = `(5尺布) 幅數 ${panels} 幅 × 進位高度 ${heightCeil} 尺 = ${totalFabric} 尺`;
            } else {
                totalFabric = Math.ceil(wFt * multiplier);
                res.steps[2] = `(9尺布) 寬度 ${wFt.toFixed(2)} 尺 × ${multiplier} 倍 = ${totalFabric} 尺`;
            }

            const trackPrice = (style === 'S簾') ? 250 : 130;
            const trackFt = Math.max(Math.ceil(wFt), 5); 
            const trackTotal = trackFt * trackPrice;
            const fabricTotal = totalFabric * listPrice * 1.45;
            
            res.baseTotal = Math.round(fabricTotal + trackTotal);
            res.formulaHTML = `布料：${totalFabric} 尺 × $${listPrice} × 1.45 = <strong>$${Math.round(fabricTotal)}</strong><br>`;
            res.formulaHTML += `軌道：${wFt.toFixed(2)} 尺 ➔ 進位計價 ${trackFt} 尺 × $${trackPrice} = <strong>$${Math.round(trackTotal)}</strong><br>`;
            
            if (res.baseTotal > 0 && res.baseTotal < 6000) {
                res.baseTotal += 800;
                res.formulaHTML += `基本費：總價未滿 6000 加收 = <strong>$800</strong><br>`;
            }

            res.specsStr = `${hFt.toFixed(2)}x${wFt.toFixed(2)}尺, ${type}, ${style}`;
            res.fabricVal = `${totalFabric} 尺`;
            
        } else if (currentTab === 'panel') {
            const trackPrice = parseFloat(document.getElementById('panelTrackPrice').value) || 0;
            const fabricWidth = document.getElementById('panelFabricWidth').value;
            
            const p1 = parseFloat(document.getElementById('panelPrice1').value) || 0;
            const c1 = parseInt(document.getElementById('panelCount1').value) || 0;
            const p2 = parseFloat(document.getElementById('panelPrice2').value) || 0;
            const c2 = parseInt(document.getElementById('panelCount2').value) || 0;
            
            const totalPanels = c1 + c2;
            const fabricTotal = (p1 * c1) + (p2 * c2);

            const wandTypePrice = parseInt(document.getElementById('panelWandType').value) || 0;
            const wandQty = parseInt(document.getElementById('panelWandQty').value) || 0;
            const wandTotal = wandTypePrice * wandQty;

            const trackType = parseInt(document.getElementById('panelTrackType').value) || 1;
            const fixingFee = parseInt(document.getElementById('panelFixing').value) || 0;

            res.steps[1] = `片簾：幅寬 ${fabricWidth}cm, 總安裝 ${totalPanels} 片`;
            res.steps[2] = `主布片(${c1}片) $${p1*c1} + 跳色布片(${c2}片) $${p2*c2}`;

            const materialSubtotal = (trackPrice + fabricTotal) * 1.3;
            
            const freight = trackType === 2 ? 800 : 400;
            let installFee = 3500;
            if (wFt > 10) {
                installFee += Math.ceil(wFt - 10) * 300;
            }
            const hardwareSubtotal = (freight + wandTotal + installFee + fixingFee) * 1.2;

            res.baseTotal = Math.round(materialSubtotal + hardwareSubtotal);
            
            res.formulaHTML = `(手動軌道 $${trackPrice} + 布片總額 $${fabricTotal}) × 1.3 = <strong>$${Math.round(materialSubtotal)}</strong><br>`;
            res.formulaHTML += `(運$${freight} + 棒$${wandTotal} + 裝$${installFee} + 五金$${fixingFee}) × 1.2 = <strong>$${Math.round(hardwareSubtotal)}</strong><br>`;
            
            let fabricSpec = `片簾(${c1}片)`;
            if (c2 > 0) fabricSpec = `片簾(${c1}+${c2}片混搭)`;
            res.specsStr = `${hFt.toFixed(2)}x${wFt.toFixed(2)}尺, ${fabricSpec}`;
            res.fabricVal = `${totalPanels} 片`;

        } else if (currentTab === 'blinds') {
            const blindSelect = document.getElementById('blindType');
            const [minCai, blindName] = blindSelect.value.split('_');
            const listPrice = parseFloat(document.getElementById('blindListPrice').value) || 0;

            const calcCai = Math.ceil(wFt * hFt);
            const finalCai = Math.max(calcCai, parseInt(minCai));

            res.steps[1] = `窗材種類：${blindName} (基本才數 ${minCai} 才)`;
            res.steps[2] = `實算才數：${calcCai} 才 ➔ 計價才數：${finalCai} 才`;

            res.baseTotal = Math.round(finalCai * listPrice * 1.3);
            res.formulaHTML = `窗材：${finalCai} 才 × 牌價 $${listPrice} × 1.3 = <strong>$${res.baseTotal}</strong><br>`;

            res.specsStr = `${hFt.toFixed(2)}x${wFt.toFixed(2)}尺, ${blindName}`;
            res.fabricVal = `${finalCai} 才`;
        }

        res.formulaHTML += `<span style="color:var(--accent-color); font-weight:bold; display:inline-block; margin-top:8px;">➔ 系統預估價：$${res.baseTotal.toLocaleString()}</span>`;
        return res;
    }

    function updateUI() {
        const manualPrice = document.getElementById('manualPrice').value;
        const res = getCalcResult();

        if (!res) {
            document.getElementById('step1').innerHTML = "<span style='color:#C06055;'>等待輸入有效尺寸...</span>";
            document.getElementById('step2').innerText = "--";
            document.getElementById('step3').innerText = "--";
            document.getElementById('step4').innerText = "--";
            document.getElementById('priceDisplay').innerHTML = `<span class="price-value">NT$ 0</span>`;
            return;
        }

        document.getElementById('step1').innerText = res.steps[0];
        document.getElementById('step2').innerText = res.steps[1];
        document.getElementById('step3').innerText = res.steps[2];
        document.getElementById('step4').innerHTML = res.formulaHTML;

        if (manualPrice && manualPrice.trim() !== "") {
            document.getElementById('priceDisplay').innerHTML = `<span class="overridden-price">NT$ ${res.baseTotal.toLocaleString()}</span><br><span class="manual-active">NT$ ${parseFloat(manualPrice).toLocaleString()}</span>`;
        } else {
            document.getElementById('priceDisplay').innerHTML = `<span class="price-value">NT$ ${res.baseTotal.toLocaleString()}</span>`;
        }
    }

    async function saveData() {
        const customerName = document.getElementById('customerName').value || '未命名客戶';
        const manualPrice = document.getElementById('manualPrice').value;
        const res = getCalcResult();

        if (!res) { 
            alert("請輸入完整尺寸！"); 
            return; 
        }

        const formulaText = res.formulaHTML.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();

        const payload = {
            action: 'save',
            date: new Date().toLocaleDateString('zh-TW'),
            name: customerName,
            specs: res.specsStr,
            fabric: res.fabricVal,
            estimated: res.baseTotal,
            price: (manualPrice !== "") ? parseInt(manualPrice) : res.baseTotal,
            note: formulaText
        };

        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 正在同步至雲端...";
        btn.disabled = true;

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            // 替換原本的 alert，改為呼叫自訂 Modal
            showSuccessModal(customerName);
            setTimeout(loadHistory, 1000); 
            
        } catch (e) {
            alert("儲存失敗，請確認 GAS 網址。");
        } finally {
            btn.innerText = "💾 儲存報價資料";
            btn.disabled = false;
        }
    }

    // --- 新增：Modal 視窗控制與表單重置邏輯 ---
    function showSuccessModal(name) {
        document.getElementById('modalQuestion').innerHTML = `是否繼續新增 <strong>[${name}]</strong> 的其他空間？`;
        document.getElementById('successModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }

    function resetForm(keepCustomerName) {
        // 如果選擇「完成結案」，則連同客戶名稱一起清空
        if (!keepCustomerName) {
            document.getElementById('customerName').value = '';
        }

        // 清空所有尺寸與手動覆寫金額
        document.getElementById('widthCm').value = '';
        document.getElementById('widthFt').value = '';
        document.getElementById('heightCm').value = '';
        document.getElementById('heightFt').value = '';
        document.getElementById('manualPrice').value = '';

        // 片簾專屬欄位回歸預設值，避免下一窗帶有奇怪的舊數字
        document.getElementById('panelPrice1').value = '500';
        document.getElementById('panelCount1').value = '4';
        document.getElementById('panelPrice2').value = '0';
        document.getElementById('panelCount2').value = '0';
        document.getElementById('panelWandQty').value = '1';

        // 重新觸發計算邏輯，讓版面歸零
        updateUI();
    }

    function continueAdding() {
        closeModal();
        resetForm(true); // 傳入 true 代表保留客戶名稱
        document.getElementById('customerName').focus(); // 讓游標回到輸入框，方便直接修改後面的空間名稱（例如把"主臥"刪掉改成"客廳"）
    }

    function finishAndClose() {
        closeModal();
        resetForm(false); // 傳入 false 代表全數清空
    }

    async function loadHistory() {
        if (!GOOGLE_SCRIPT_URL) return;
        const grid = document.getElementById('historyGrid');
        grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>載入雲端紀錄中...</p>";
        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=load`);
            const data = await response.json();
            grid.innerHTML = '';
            if(data.length === 0) {
                 grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>暫無紀錄。</p>";
                 return;
            }
            data.reverse().forEach(row => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <h4 style="margin:0 0 10px 0; color:var(--accent-color);">${row[1] || '未具名'}</h4>
                    <p style="margin:4px 0; font-size:0.85rem; color:#666;"><strong>日期:</strong> ${row[0]}</p>
                    <p style="margin:4px 0; font-size:0.85rem; color:#666;"><strong>規格:</strong> ${row[2]}</p>
                    <p style="margin:4px 0; font-size:0.85rem; color:#666;"><strong>試算價:</strong> $${parseInt(row[4]).toLocaleString()}</p>
                    <div style="font-size:1.4rem; color:var(--accent-color); text-align:right; font-weight:bold; font-family:'Playfair Display'; margin-top:10px;">
                        最後報價: NT$ ${parseInt(row[5]).toLocaleString()}
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color: #C06055;'>讀取失敗。</p>";
        }
    }
</script>
